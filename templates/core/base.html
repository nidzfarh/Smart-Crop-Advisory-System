<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCrop | Agricultural Intelligence</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/dark-theme.css">

    <style>
        :root {
            /* Definitive Professional Dark Palette - Targeted for Readability */
            --bg: #0b111d;
            /* Slightly deeper blue-black */
            --surface: #141d2e;
            /* Slightly warmer surface */
            --primary: #10b981;
            --primary-light: #34d399;
            --accent: #064e3b;
            --text-header: #f8fafc;
            /* Pure white for headers */
            --text-main: #e2e8f0;
            /* Soft white for readability */
            --text-muted: #94a3b8;
            /* Clear but secondary */
            --border: rgba(255, 255, 255, 0.08);
            /* More subtle borders */
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            --radius: 12px;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.75;
            /* Increased for readability */
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        /* Professional Navigation */
        .navbar {
            background-color: var(--bg) !important;
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 0;
            box-shadow: none;
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--primary) !important;
            font-size: 1.5rem;
            letter-spacing: -0.04em;
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.5rem 1.25rem !important;
            transition: all 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary) !important;
        }

        .btn-nav-primary {
            background-color: var(--primary);
            color: #0b0f19 !important;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 750;
            padding: 0.65rem 1.75rem !important;
            margin-left: 1rem;
            transition: transform 0.2s, background-color 0.2s;
            border: none;
        }

        .btn-nav-primary:hover {
            transform: translateY(-2px);
            background-color: var(--primary-light);
        }

        /* Global Component Styling */
        .card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            transition: border-color 0.2s, transform 0.2s;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .card:hover {
            border-color: rgba(16, 185, 129, 0.4);
        }

        .card-header {
            background: rgba(17, 24, 39, 0.8) !important;
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
            font-weight: 750;
            color: #ffffff;
        }

        .section-title {
            font-weight: 800;
            font-size: 2.25rem;
            color: var(--text-header);
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
        }

        .section-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
        }

        /* Forms */
        .form-label {
            font-weight: 800;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .form-control,
        .form-select {
            background-color: #0b0f19 !important;
            border: 1px solid var(--border) !important;
            padding: 0.85rem 1.15rem !important;
            font-size: 0.95rem;
            color: var(--text-main) !important;
            border-radius: var(--radius);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1) !important;
        }

        /* Main Content Scaling */
        .main-content {
            padding: 4rem 0;
            min-height: calc(100vh - 180px);
        }

        /* Weather Forecast Widget */
        .weather-section {
            margin-bottom: 3rem;
        }

        .weather-forecast-scroll {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding: 0.5rem 0.25rem 1.5rem 0.25rem;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) var(--bg);
        }

        .weather-forecast-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .weather-forecast-scroll::-webkit-scrollbar-track {
            background: var(--bg);
        }

        .weather-forecast-scroll::-webkit-scrollbar-thumb {
            background-color: var(--primary);
            border-radius: 10px;
        }

        .forecast-card {
            min-width: 140px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        .forecast-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .forecast-card.is-today {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.05);
        }

        .fc-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .fc-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        .fc-temp {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 0.25rem;
        }

        .fc-precip {
            font-size: 0.75rem;
            font-weight: 600;
            color: #3b82f6;
        }

        /* Autocomplete Styles */
        .autocomplete-container {
            position: relative;
        }

        .autocomplete-items {
            position: absolute;
            border: 1px solid var(--border);
            border-bottom: none;
            border-top: none;
            z-index: 99;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--surface);
            border-radius: 0 0 12px 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .autocomplete-items div {
            padding: 12px 15px;
            cursor: pointer;
            color: var(--text-main);
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .autocomplete-items div:hover {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--primary);
        }

        .autocomplete-active {
            background-color: rgba(16, 185, 129, 0.2) !important;
            color: #ffffff !important;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container d-flex align-items-center justify-content-between">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span class="me-2">🌱</span> SmartCrop
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'predict' %}">Analysis</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'add_crop' %}">Tracking</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn-nav-primary">Sign Out</button>
                        </form>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'login' %}">Sign In</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="nav-link btn-nav-primary" href="{% url 'register' %}">Get Started</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
